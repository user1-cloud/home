<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D交互主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            overflow: hidden;
            background: #1A1A1D;
            color: white;
            perspective: 1200px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            opacity: 0;
            transform: scale(0.8);
            animation: bgIn 1.2s ease forwards;
        }

        @keyframes bgIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .container {
            width: 90%;
            max-width: 700px;
            text-align: center;
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
            opacity: 0;
            animation: containerIn 0.8s 0.3s ease forwards;
        }

        @keyframes containerIn {
            to { opacity: 1; }
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 40px;
            transform-style: preserve-3d;
            transition: all 0.3s ease;
            text-shadow: 0 2px 10px rgba(230, 57, 124, 0.3),
                         0 0 20px rgba(230, 57, 124, 0.1);
            transform: translateZ(40px);
            opacity: 0;
            animation: titleIn 0.8s 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes titleIn {
            from { transform: translateZ(-80px); opacity: 0; }
            to { transform: translateZ(40px); opacity: 1; }
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #f5efea;
            border-radius: 50px;
            padding: 0 30px;
            margin: 0 auto 40px;
            transform-style: preserve-3d;
            transition: all 0.4s ease;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            opacity: 0;
            height: 70px;
            animation: searchIn 0.8s 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes searchIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .search-box:hover {
            height: 80px;
            margin-bottom: 45px;
            box-shadow: 0 15px 40px rgba(230, 57, 124, 0.35);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 0 10px;
            color: #1A1A1D;
            font size: 17px;
        }

        .search-input::placeholder {
            color: #666;
        }

        .search-btn {
            background: transparent;
            border: none;
            color: #1A1A1D;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 10px;
        }

        .search-btn:hover {
            color: #E6397C;
            transform: scale(1.3);
            text-shadow: 0 0 15px #E6397C;
        }

        .quick-access {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            transform-style: preserve-3d;
        }

        .quick-item {
            width: 120px;
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #1A1A1D;
            background: #f5efea;
            border-radius: 18px;
            transition: all 1s ease;
            opacity: 0;
            animation: quickIn 0.8s 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes quickIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .quick-item:hover {
            width: 235px;
            height: 110px;
            background: #f5efea;
            box-shadow: 0 15px 30px rgba(230, 57, 124, 0.25);
        }

        .quick-icon {
            font-size: 32px;
            margin-bottom: 8px;
            transition: all 0.8s ease;
        }

        .quick-item:hover .quick-icon {
            transform: scale(1.2);
            color: #E6397C;
            text-shadow: 0 0 20px #E6397C;
        }

        .quick-text {
            font-size: 14px;
            transition: all 0.8s ease;
        }

        .quick-item:hover .quick-text {
            transform: scale(1.08);
            font-weight: 600;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="canvas-container"></div>

    <div class="container" id="container">
        <h1 class="title" id="mainTitle">主页</h1>
        
        <div class="search-box" id="searchBox">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索内容...">
            <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i></button>
        </div>

        <div class="quick-access">
            <a href="https://www.msn.com/weather" class="quick-item">
                <div class="quick-icon"><i class="fas fa-cloud-sun"></i></div>
                <div class="quick-text">天气</div>
            </a>
            <a href="https://www.bilibili.com" class="quick-item">
                <div class="quick-icon"><i class="fas fa-video"></i></div>
                <div class="quick-text">哔哩哔哩</div>
            </a>
            <a href="https://www.baidu.com" class="quick-item">
                <div class="quick-icon"><i class="fas fa-search"></i></div>
                <div class="quick-text">百度</div>
            </a>
            <a href="https://www.qianwen.com/" class="quick-item">
                <div class="quick-icon"><i class="fas fa-comments"></i></div>
                <div class="quick-text">千问</div>
            </a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        camera.position.z = 15;

        const geometry = new THREE.TorusKnotGeometry(5, 1, 280, 36, 2, 3);
        const material = new THREE.MeshBasicMaterial({
            color: 0xE6397C,
            transparent: true,
            opacity: 1
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        const mainContainer = document.getElementById('container');
        let mouseX = 0, mouseY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth/2) / 30;
            mouseY = (e.clientY - window.innerHeight/2) / 30;

            mesh.rotation.y = mouseX * 0.06;
            mesh.rotation.x = -mouseY * 0.06;
            mainContainer.style.transform = `rotateY(${mouseX * 0.6}deg) rotateX(${-mouseY * 1.2}deg)`;
        });

        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        
        function search() {
            const kw = searchInput.value.trim();
            if(kw) {
                window.open(`https://www.bing.com/search?q=${encodeURIComponent(kw)}`, '_self');
            }
        }

        searchBtn.addEventListener('click', search);
        searchInput.addEventListener('keydown', e => {
            if(e.key === 'Enter') search();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
